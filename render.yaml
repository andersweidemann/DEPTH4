# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint → connect this repo → set secret env vars in the dashboard.
# After deploy: set Vercel NEXT_PUBLIC_API_URL to this service URL (https://…onrender.com).
version: "1"
services:
  - type: web
    name: depth4-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: signal/apps/api
    dockerfilePath: Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INGEST_CRON_SECRET
        sync: false
      - key: RSS_INTERVAL_SECONDS
        value: "60"
      # Set to "false" for quality-first idle billing: no in-process ingest/briefing/refinement timers;
      # use cron /ingest-once or dashboard Refresh (POST /market/ingest-session).
      - key: ENABLE_BACKGROUND_LLM_LOOPS
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      # Optional split routing (set in dashboard if desired; do not leave blank keys overriding secrets).
      - key: LLM_PROVIDER_CLASSIFY
        sync: false
      - key: LLM_PROVIDER_ANALYSIS
        sync: false
      # Optional: use NVIDIA NIM for cheap pipeline tests (set LLM_PROVIDER=nvidia and NVIDIA_API_KEY).
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      # Optional: Kimi (Moonshot) for analysis (set LLM_PROVIDER_ANALYSIS=kimi and KIMI_API_KEY).
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: KIMI_MODEL
        value: ""
      - key: FRONTEND_URL
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_INSTITUTIONAL
        sync: false
      - key: ONE_SIGNAL_APP_ID
        sync: false
      - key: ONE_SIGNAL_API_KEY
        sync: false
