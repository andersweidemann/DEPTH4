# Default factory config (multi-symbol). For focused M15 work, use a campaign overlay:
#   python -m agents.run_loop --gens 20 --config config/campaigns/ger40_m15.discovery.yaml
#   python -m agents.run_loop --gens 30 --stop-on-accept --config config/campaigns/ger40_m15.strict.yaml
# Or:  TRADING_CONFIG_OVERLAY=config/campaigns/xauusd_m15.discovery.yaml  ./scripts/factory_loop.sh 25
#
# Cost model calibrated to Pepperstone Razor MT5. Pepperstone Razor charges
# $7/lot round-turn ONLY on FX pairs; metals (XAUUSD) and indices (GER40) have
# zero commission and cost is entirely baked into the spread. Spread values
# here are intentionally a bit wider than Pepperstone's quoted typical to leave
# margin for news-time widening and occasional slippage. Override with your
# actual broker figures once you run `python -m agents.data_fetch --source mt5`
# on the VPS and observe real fill costs.
symbols:
  xauusd:
    broker_name: "XAUUSD"          # confirm in your MT5 Market Watch
    spread_points: 30              # Pepperstone Razor typical ~15pts; 30 = 2x buffer
    slippage_points: 2
    commission_per_lot: 0.0        # Pepperstone Razor: metals are spread-only
    point_size: 0.01
    contract_size: 100
  ger40:
    broker_name: "GER40"           # Pepperstone uses GER40; other brokers: DE40, DAX40, GER40.cash
    spread_points: 20              # Pepperstone Razor typical ~15pts (= 1.5 index pts); 20 = buffer
    slippage_points: 1
    commission_per_lot: 0.0        # Pepperstone Razor: indices are spread-only
    point_size: 0.1
    contract_size: 1
  us500:
    broker_name: "US500"           # Dukascopy USA500.IDX/USD; MT5 may be US500 / SPXm / ES
    spread_points: 15              # ~0.15 index pts typical; buffer for 5m
    slippage_points: 1
    commission_per_lot: 0.0
    point_size: 0.01
    contract_size: 1
  btcusd:
    broker_name: "BTCUSD"          # Pepperstone Razor; confirm Market Watch spelling (BTCUSD vs BTCUSD.a)
    spread_points: 120             # ~$12 typical at ~100k BTC in $ terms; widen for backtest stress
    slippage_points: 10            # crypto slippage buffer (points)
    commission_per_lot: 0.0        # Pepperstone crypto CFDs are typically spread-only (verify statement)
    point_size: 0.01               # MT5 BTCUSD often 2 decimals for $ price
    contract_size: 1               # 1 unit = 1 BTC on many CFD specs; verify broker contract size

timeframes: [M5, M15]

windows:
  is_start: "2020-01-01"
  is_end:   "2024-06-30"
  oos_start: "2024-07-01"
  oos_end:   "today"

walk_forward:
  is_months: 6
  oos_months: 2

risk:
  per_trade_pct: 0.5
  daily_dd_kill_pct: 3.0
  max_concurrent_per_symbol: 1

acceptance:
  # Strict > : use 1.999 so PF reported as 2.00 still passes (float noise).
  pf_min: 1.999
  # Compound annual return % (from IS window + combo total return); strict >.
  return_cagr_pct_min: 5.0
  max_dd_pct: 25.0
  sharpe_min: 0.2
  trades_min: 100
  # If false, one weak symbol/TF does not veto the whole candidate.
  require_all_combos_positive: false
  max_local_vs_mt5_divergence_pct: 20.0

loop:
  candidates_per_gen: 4
  survivors: 2
  max_generations: 20
  scout_every_n_gens: 5

llm:
  provider: nvidia                # anthropic | openai | nvidia | ollama
  model: meta/llama-3.3-70b-instruct
  max_tokens: 8192
  temperature: 0.45
  # NVIDIA: set NVIDIA_API_KEY in repo-root .env (see NVIDIA_API_BASE in llm_client).
  # Switch back to anthropic + ANTHROPIC_API_KEY when you want Claude again.
  # To test the loop against a local Ollama model without spending API tokens,
  # flip provider to `ollama` and pick a model you've pulled. On an 8 GB Mac
  # you'll want a 3B-class model; expect much shakier output than Claude.
  # Example swap:
  #   provider: ollama
  #   model: qwen2.5-coder:3b
  #   max_tokens: 4096           # 3B context-window is usually 32K; lower is fine
  #   temperature: 0.4           # tighter to improve JSON reliability

scout:
  max_results_per_query: 40
  default_queries:
    - "MT5 XAUUSD EA language:MQL5"
    - "MQL5 indicator regime"
    - "MQL5 EA breakout"
    - "DAX breakout strategy"
    - "gold scalping strategy python"
    - "mean reversion MQL5"
  denylist_path: scouting/denylist.yaml

vps:
  repo_root: "C:\\TRADING"
  metaeditor_path: "C:\\Program Files\\MetaTrader 5\\metaeditor64.exe"
  terminal_path:   "C:\\Program Files\\MetaTrader 5\\terminal64.exe"
  mql5_include_dir: "MQL5\\Include\\Factory"
  mql5_experts_dir: "MQL5\\Experts\\Factory"

data:
  root: data
  source_priority: [mt5, dukascopy, demo]
