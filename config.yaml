# Cost model calibrated to Pepperstone Razor MT5. Pepperstone Razor charges
# $7/lot round-turn ONLY on FX pairs; metals (XAUUSD) and indices (GER40) have
# zero commission and cost is entirely baked into the spread. Spread values
# here are intentionally a bit wider than Pepperstone's quoted typical to leave
# margin for news-time widening and occasional slippage. Override with your
# actual broker figures once you run `python -m agents.data_fetch --source mt5`
# on the VPS and observe real fill costs.
symbols:
  xauusd:
    broker_name: "XAUUSD"          # confirm in your MT5 Market Watch
    spread_points: 30              # Pepperstone Razor typical ~15pts; 30 = 2x buffer
    slippage_points: 2
    commission_per_lot: 0.0        # Pepperstone Razor: metals are spread-only
    point_size: 0.01
    contract_size: 100
  ger40:
    broker_name: "GER40"           # Pepperstone uses GER40; other brokers: DE40, DAX40, GER40.cash
    spread_points: 20              # Pepperstone Razor typical ~15pts (= 1.5 index pts); 20 = buffer
    slippage_points: 1
    commission_per_lot: 0.0        # Pepperstone Razor: indices are spread-only
    point_size: 0.1
    contract_size: 1

timeframes: [M5, M15]

windows:
  is_start: "2020-01-01"
  is_end:   "2024-06-30"
  oos_start: "2024-07-01"
  oos_end:   "today"

walk_forward:
  is_months: 6
  oos_months: 2

risk:
  per_trade_pct: 0.5
  daily_dd_kill_pct: 3.0
  max_concurrent_per_symbol: 1

acceptance:
  pf_min: 1.5
  max_dd_pct: 15.0
  sharpe_min: 1.5
  trades_min: 200
  require_all_combos_positive: true
  max_local_vs_mt5_divergence_pct: 20.0

loop:
  candidates_per_gen: 4
  survivors: 2
  max_generations: 20
  scout_every_n_gens: 5

llm:
  provider: anthropic            # anthropic | openai | ollama
  model: claude-opus-4-7         # flagship reasoning; ~$5/MTok in, $25/MTok out
  max_tokens: 8192
  temperature: 0.6
  # To test the loop against a local Ollama model without spending API tokens,
  # flip provider to `ollama` and pick a model you've pulled. On an 8 GB Mac
  # you'll want a 3B-class model; expect much shakier output than Claude.
  # Example swap:
  #   provider: ollama
  #   model: qwen2.5-coder:3b
  #   max_tokens: 4096           # 3B context-window is usually 32K; lower is fine
  #   temperature: 0.4           # tighter to improve JSON reliability

scout:
  max_results_per_query: 40
  default_queries:
    - "MT5 XAUUSD EA language:MQL5"
    - "MQL5 indicator regime"
    - "MQL5 EA breakout"
    - "DAX breakout strategy"
    - "gold scalping strategy python"
    - "mean reversion MQL5"
  denylist_path: scouting/denylist.yaml

vps:
  repo_root: "C:\\TRADING"
  metaeditor_path: "C:\\Program Files\\MetaTrader 5\\metaeditor64.exe"
  terminal_path:   "C:\\Program Files\\MetaTrader 5\\terminal64.exe"
  mql5_include_dir: "MQL5\\Include\\Factory"
  mql5_experts_dir: "MQL5\\Experts\\Factory"

data:
  root: data
  source_priority: [mt5, dukascopy, demo]
