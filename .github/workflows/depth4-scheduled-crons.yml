# Hobby Vercel cannot run crons more than once per day (see vercel.json).
# These jobs call the same routes on a schedule using CRON_SECRET.

name: DEPTH4 scheduled crons

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  thesis-intelligence-pipeline:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run thesis intelligence pipeline
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://depth4.com
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set in repo secrets"
            exit 1
          fi
          curl -sfS -X GET "$APP_URL/api/cron/thesis-intelligence-pipeline" \
            -H "Authorization: Bearer $CRON_SECRET"

  evidence-cascade:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Process evidence cascade queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://depth4.com
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set in repo secrets"
            exit 1
          fi
          curl -sfS -X GET "$APP_URL/api/cron/evidence-cascade" \
            -H "Authorization: Bearer $CRON_SECRET"
